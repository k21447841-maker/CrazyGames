<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Space Shooter</title>
<style>
body,html{margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden;font-family:sans-serif;touch-action:none;}
canvas{display:block;}
.ui{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;justify-content:center;align-items:center;background:rgba(0,0,0,0.8);}
.hud{position:absolute;top:20px;left:20px;color:#0f0;font-size:24px;font-weight:bold;text-shadow:0 0 10px #0f0;}
.active{display:flex;}
h1{color:#f00;font-size:48px;text-transform:uppercase;text-shadow:0 0 20px #f00;margin-bottom:10px;}
button{background:transparent;border:2px solid #0f0;color:#0f0;padding:15px 40px;font-size:24px;border-radius:30px;cursor:pointer;text-transform:uppercase;font-weight:bold;box-shadow:0 0 15px rgba(0,255,0,0.5) inset;transition:0.2s;}
button:active{transform:scale(0.95);background:#0f0;color:#000;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud">Score: <span id="s">0</span> | Best: <span id="bs">0</span></div>
<div id="start" class="ui active"><h1>Space Shooter</h1><button onclick="st()">Start</button></div>
<div id="over" class="ui"><h1>Destroyed</h1><h2 style="color:#fff">Score: <span id="fs">0</span></h2><button onclick="st()">Retry</button></div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let w,h,ply,ens,bls,sc=0,bs=localStorage.getItem('sh_bs')||0,stt=0;
document.getElementById('bs').innerText=bs;
function rs(){w=c.width=window.innerWidth;h=c.height=window.innerHeight;}
window.addEventListener('resize',rs);rs();
const AC=window.AudioContext||window.webkitAudioContext;const ax=new AC();
function pS(f,t,v=0.1,type='square'){if(ax.state==='suspended')ax.resume();let o=ax.createOscillator(),g=ax.createGain();o.type=type;o.frequency.setValueAtTime(f,ax.currentTime);o.frequency.exponentialRampToValueAtTime(t,ax.currentTime+0.1);g.gain.setValueAtTime(v,ax.currentTime);g.gain.exponentialRampToValueAtTime(0.01,ax.currentTime+0.1);o.connect(g);g.connect(ax.destination);o.start();o.stop(ax.currentTime+0.1);}
function st(){stt=1;sc=0;ens=[];bls=[];ply={x:w/2,y:h-100,cd:0};document.getElementById('start').className='ui';document.getElementById('over').className='ui';document.getElementById('s').innerText=0;lp();}
function ov(){stt=0;if(sc>bs){bs=sc;localStorage.setItem('sh_bs',bs);document.getElementById('bs').innerText=bs;}document.getElementById('fs').innerText=Math.floor(sc);document.getElementById('over').className='ui active';}
let mx=w/2,my=h-100;
window.addEventListener('touchmove',e=>{mx=e.touches[0].clientX;my=e.touches[0].clientY;});
window.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
function up(){
if(stt!==1)return;
ply.x+=(mx-ply.x)*0.3;ply.y+=(my-ply.y)*0.3;
if(--ply.cd<=0){bls.push({x:ply.x,y:ply.y-20,vy:-10});ply.cd=10;pS(800,1200,0.05,'sine');}
if(Math.random()<0.03+sc*0.0005)ens.push({x:Math.random()*w,y:-30,r:15,vy:2+sc*0.02});
for(let i=bls.length-1;i>=0;i--){
let b=bls[i];b.y+=b.vy;if(b.y<0){bls.splice(i,1);continue;}
for(let j=ens.length-1;j>=0;j--){
let e=ens[j];if(Math.hypot(b.x-e.x,b.y-e.y)<e.r+5){bls.splice(i,1);ens.splice(j,1);sc+=10;document.getElementById('s').innerText=sc;pS(200,100,0.1,'sawtooth');break;}
}}
for(let i=ens.length-1;i>=0;i--){
let e=ens[i];e.y+=e.vy;if(Math.hypot(ply.x-e.x,ply.y-e.y)<e.r+15){pS(100,40,0.3,'sawtooth');ov();}
if(e.y>h+30)ens.splice(i,1);
}}
function dr(){
ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,w,h);
ctx.shadowBlur=10;ctx.shadowColor='#0f0';ctx.fillStyle='#0f0';
bls.forEach(b=>{ctx.fillRect(b.x-2,b.y,4,15);});
ctx.shadowColor='#f00';ctx.fillStyle='#f00';
ens.forEach(e=>{ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,6.3);ctx.fill()});
ctx.shadowColor='#0ff';ctx.fillStyle='#0ff';
ctx.beginPath();ctx.moveTo(ply.x,ply.y-20);ctx.lineTo(ply.x+15,ply.y+15);ctx.lineTo(ply.x-15,ply.y+15);ctx.fill();
ctx.shadowBlur=0;
}
function lp(){up();dr();if(stt===1)requestAnimationFrame(lp);}
dr();
</script></body></html>
