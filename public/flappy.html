<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flappy Clone</title>
<style>
body,html{margin:0;padding:0;width:100%;height:100%;background:#1a1a2e;overflow:hidden;font-family:sans-serif;touch-action:none;user-select:none;}
canvas{display:block;margin:0 auto;}
.ui{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;justify-content:center;align-items:center;background:rgba(26,26,46,0.8);}
.hud{position:absolute;top:20px;width:100%;text-align:center;color:#e94560;font-size:48px;font-weight:bold;text-shadow:0 0 15px #e94560;z-index:10;}
.active{display:flex;}
h1{color:#0f3460;font-size:48px;text-transform:uppercase;text-shadow:0 0 20px #e94560;margin-bottom:10px;}
button{background:#e94560;border:none;color:#fff;padding:15px 40px;font-size:24px;border-radius:30px;cursor:pointer;text-transform:uppercase;font-weight:900;box-shadow:0 6px 0 #90293d;transition:0.1s;}
button:active{transform:translateY(6px);box-shadow:0 0 0;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud" id="hud" style="display:none;"><span id="s">0</span></div>
<div id="start" class="ui active"><h1>Neon Flap</h1><h2 style="color:#fff">Best: <span id="bs1">0</span></h2><button onclick="st(event)">Tap to Fly</button></div>
<div id="over" class="ui"><h1>Oops</h1><h2 style="color:#fff">Score: <span id="fs">0</span> | Best: <span id="bs2">0</span></h2><button onclick="st(event)">Retry</button></div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let w,h,b,p,sc=0,bs=localStorage.getItem('fl_bs')||0,stt=0;
document.getElementById('bs1').innerText=bs;document.getElementById('bs2').innerText=bs;
function rs(){w=c.width=Math.min(window.innerWidth,600);h=c.height=window.innerHeight;}
window.addEventListener('resize',rs);rs();
const ax=new (window.AudioContext||window.webkitAudioContext)();
function pS(f,t,v,ty='square'){if(ax.state==='suspended')ax.resume();let o=ax.createOscillator(),g=ax.createGain();o.type=ty;o.frequency.setValueAtTime(f,ax.currentTime);o.frequency.exponentialRampToValueAtTime(t,ax.currentTime+0.1);g.gain.setValueAtTime(v,ax.currentTime);g.gain.exponentialRampToValueAtTime(0.01,ax.currentTime+0.1);o.connect(g);g.connect(ax.destination);o.start();o.stop(ax.currentTime+0.1);}
function st(e){if(e)e.stopPropagation();stt=1;sc=0;p=[];b={x:w/3,y:h/2,vy:0};document.querySelectorAll('.ui').forEach(e=>e.classList.remove('active'));document.getElementById('hud').style.display='block';document.getElementById('s').innerText=0;lp();}
function ov(){stt=0;if(sc>bs){bs=sc;localStorage.setItem('fl_bs',bs);document.getElementById('bs1').innerText=bs;document.getElementById('bs2').innerText=bs;}document.getElementById('fs').innerText=sc;document.getElementById('over').classList.add('active');document.getElementById('hud').style.display='none';pS(150,50,0.5,'sawtooth');}
function fl(){if(stt===1){b.vy=-9;pS(400,600,0.1,'sine');}}
window.addEventListener('keydown',e=>{if(e.code==='Space'){fl();if(stt===0&&document.getElementById('start').className.includes('active'))st();}});
window.addEventListener('touchstart',fl);window.addEventListener('mousedown',fl);
function up(){
if(stt!==1)return;b.vy+=0.5;b.y+=b.vy;
if(b.y>h-50||b.y<0)ov();
if(p.length===0||w-p[p.length-1].x>300){let g=160,y=Math.random()*(h-g-200)+100;p.push({x:w,y:y,g:g,pd:false});}
for(let i=p.length-1;i>=0;i--){
let pi=p[i];pi.x-=4;
if(b.x+15>pi.x&&b.x-15<pi.x+60&&(b.y-15<pi.y||b.y+15>pi.y+pi.g))ov();
if(!pi.pd&&b.x>pi.x+60){pi.pd=true;sc++;document.getElementById('s').innerText=sc;pS(800,1200,0.1,'sine');}
if(pi.x+60<0)p.splice(i,1);
}}
function dr(){
ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,w,h);
ctx.fillStyle='#0f3460';ctx.fillRect(0,h-50,w,50);
ctx.shadowBlur=15;ctx.shadowColor='#e94560';ctx.fillStyle='#e94560';
p.forEach(pi=>{ctx.fillRect(pi.x,0,60,pi.y);ctx.fillRect(pi.x,pi.y+pi.g,60,h);});
ctx.shadowColor='#fff';ctx.fillStyle='#fff';
ctx.beginPath();ctx.arc(b.x,b.y,15,0,6.28);ctx.fill();ctx.shadowBlur=0;
}
function lp(){up();dr();if(stt===1)requestAnimationFrame(lp);}
dr();
</script></body></html>
