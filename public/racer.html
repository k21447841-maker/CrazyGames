<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Traffic Racer</title>
<style>
body,html{margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden;font-family:sans-serif;touch-action:none;user-select:none;}
.gw{width:100%;max-width:500px;height:100%;margin:0 auto;position:relative;}
canvas{display:block;width:100%;height:100%;background:#111;}
.ui{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;justify-content:center;align-items:center;background:rgba(0,0,0,0.85);}
.hud{position:absolute;top:20px;right:20px;color:#fff;font-size:28px;font-weight:bold;text-shadow:0 0 10px #f0a;text-align:right;}
.active{display:flex;}
h1{color:#f0a;font-size:50px;text-transform:uppercase;font-style:italic;text-shadow:0 0 20px #f0a;margin-bottom:10px;}
button{background:transparent;border:2px solid #0ff;color:#0ff;padding:15px 50px;font-size:24px;border-radius:5px;cursor:pointer;text-transform:uppercase;font-weight:900;transform:skewX(-10deg);transition:0.1s;}
button span{display:inline-block;transform:skewX(10deg);}
button:active{background:#0ff;color:#000;}
.ctrl{position:absolute;bottom:10%;width:100%;display:flex;justify-content:space-between;padding:0 20px;box-sizing:border-box;pointer-events:none;}
.btn{width:80px;height:80px;border-radius:40px;border:2px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);pointer-events:auto;display:flex;align-items:center;justify-content:center;color:#fff;font-size:30px;}
</style>
</head>
<body>
<div class="gw">
<canvas id="c"></canvas>
<div class="hud">Score: <span id="s">0</span><br><span style="font-size:16px">Best: <span id="bs">0</span></span></div>
<div class="ctrl" id="cnt" style="display:none;"><div class="btn" id="lb">←</div><div class="btn" id="rb">→</div></div>
<div id="start" class="ui active"><h1>Neon Drift</h1><button onclick="st()"><span>Start</span></button></div>
<div id="over" class="ui"><h1>Wasted</h1><h2 style="color:#fff">Score: <span id="fs">0</span></h2><button onclick="st()"><span>Retry</span></button></div>
</div>
<script>
const cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
let w,h,car,trf,cn,ls,sc=0,bs=localStorage.getItem('rc_bs')||0,stt=0,sp=8;
document.getElementById('bs').innerText=bs;
function rs(){w=cvs.width=cvs.parentElement.clientWidth;h=cvs.height=window.innerHeight;}
window.addEventListener('resize',rs);rs();
const ax=new (window.AudioContext||window.webkitAudioContext)();
function pS(f,t,v,ty='square'){if(ax.state==='suspended')ax.resume();let o=ax.createOscillator(),g=ax.createGain();o.type=ty;o.frequency.setValueAtTime(f,ax.currentTime);o.frequency.exponentialRampToValueAtTime(t,ax.currentTime+0.1);g.gain.setValueAtTime(v,ax.currentTime);g.gain.exponentialRampToValueAtTime(0.01,ax.currentTime+0.1);o.connect(g);g.connect(ax.destination);o.start();o.stop(ax.currentTime+0.1);}
const L=[w*0.2,w*0.5,w*0.8];
function st(){stt=1;sc=0;sp=8;trf=[];cn=[];ls=[0,h/3,2*h/3,h];car={l:1,x:L[1],y:h-120};document.querySelectorAll('.ui').forEach(e=>e.classList.remove('active'));document.getElementById('s').innerText=0;if('ontouchstart' in window)document.getElementById('cnt').style.display='flex';lp();}
function ov(){stt=0;if(sc>bs){bs=sc;localStorage.setItem('rc_bs',bs);document.getElementById('bs').innerText=bs;}document.getElementById('fs').innerText=Math.floor(sc);document.getElementById('over').classList.add('active');document.getElementById('cnt').style.display='none';pS(100,20,0.5,'sawtooth');}
function mv(d){if(stt!==1)return;car.l+=d;if(car.l<0)car.l=0;if(car.l>2)car.l=2;pS(300,400,0.05,'sine');}
window.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')mv(-1);if(e.key==='ArrowRight'||e.key==='d')mv(1);});
document.getElementById('lb').addEventListener('touchstart',e=>{e.preventDefault();mv(-1);});document.getElementById('rb').addEventListener('touchstart',e=>{e.preventDefault();mv(1);});
function up(){
if(stt!==1)return;sp+=0.005;sc+=0.1;document.getElementById('s').innerText=Math.floor(sc);
car.x+=(L[car.l]-car.x)*0.2;
for(let i=0;i<ls.length;i++){ls[i]+=sp;if(ls[i]>h)ls[i]-=h+100;}
if(Math.random()<0.02+sp*0.001){if(trf.length===0||trf[trf.length-1].y>200){let l=Math.floor(Math.random()*3);trf.push({l:l,x:L[l],y:-100,c:['#f00','#f0a','#ff0'][Math.floor(Math.random()*3)]});}}
if(Math.random()<0.02){if(cn.length===0||cn[cn.length-1].y>100){let l=Math.floor(Math.random()*3);cn.push({l:l,x:L[l],y:-50});}}
for(let i=trf.length-1;i>=0;i--){let t=trf[i];t.y+=sp*0.6;if(Math.abs(car.x-t.x)<35&&Math.abs(car.y-t.y)<75)ov();if(t.y>h+100)trf.splice(i,1);}
for(let i=cn.length-1;i>=0;i--){let c=cn[i];c.y+=sp;if(Math.abs(car.x-c.x)<30&&Math.abs(car.y-c.y)<55){sc+=50;pS(800,1200,0.1,'sine');cn.splice(i,1);continue;}if(c.y>h+50)cn.splice(i,1);}
}
function dC(x,y,c){ctx.save();ctx.translate(x,y);ctx.shadowBlur=15;ctx.shadowColor=c;ctx.fillStyle=c;ctx.fillRect(-15,-40,30,80);ctx.fillStyle='#000';ctx.fillRect(-12,-20,24,15);ctx.fillStyle='#fff';ctx.fillRect(-15,-40,6,6);ctx.fillRect(9,-40,6,6);ctx.restore();}
function dr(){
ctx.fillStyle='#111';ctx.fillRect(0,0,w,h);
ctx.strokeStyle='rgba(0,255,255,0.3)';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(w*0.35,0);ctx.lineTo(w*0.35,h);ctx.moveTo(w*0.65,0);ctx.lineTo(w*0.65,h);ctx.stroke();
ctx.strokeStyle='#f0a';ctx.lineWidth=6;ctx.setLineDash([40,40]);ctx.beginPath();ls.forEach(l=>{ctx.moveTo(w*0.35,l);ctx.lineTo(w*0.35,l+40);ctx.moveTo(w*0.65,l);ctx.lineTo(w*0.65,l+40);});ctx.stroke();ctx.setLineDash([]);
ctx.shadowBlur=10;ctx.shadowColor='#ff0';ctx.fillStyle='#ff0';cn.forEach(c=>{ctx.beginPath();ctx.arc(c.x,c.y,10,0,6.28);ctx.fill();});
trf.forEach(t=>dC(t.x,t.y,t.c));dC(car.x,car.y,'#0ff');
}
function lp(){up();dr();if(stt===1)requestAnimationFrame(lp);}
dr();
</script></body></html>
