<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Runner Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050510; font-family: 'Segoe UI', sans-serif; user-select: none; }
        canvas { display: block; touch-action: none; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; justify-content: center; align-items: center; }
        .panel { background: rgba(10, 10, 30, 0.85); backdrop-filter: blur(15px); padding: 2rem; border-radius: 1.5rem; border: 1px solid rgba(139, 92, 246, 0.3); color: #fff; text-align: center; pointer-events: auto; box-shadow: 0 0 30px rgba(139, 92, 246, 0.2); }
        .hidden { display: none; }
        h1 { margin-top: 0; color: #fff; text-shadow: 0 0 10px #8b5cf6; font-size: 2.5rem; }
        button { background: linear-gradient(45deg, #7c3aed, #db2777); border: none; padding: 1rem 2.5rem; color: #fff; border-radius: 0.75rem; cursor: pointer; font-weight: 800; font-size: 1.25rem; transition: all 0.3s; text-transform: uppercase; letter-spacing: 2px; }
        button:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(219, 39, 119, 0.5); }
        #scoreBoard { position: absolute; top: 20px; left: 20px; color: #fff; font-size: 1.5rem; font-weight: bold; text-shadow: 0 0 5px #fff; }
    </style>
</head>
<body>
    <div id="scoreBoard">Score: 0 | High: 0</div>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="startScreen" class="panel">
            <h1>Neon Runner Pro</h1>
            <button onclick="startGame()">Start Game</button>
        </div>
        <div id="gameOverScreen" class="panel hidden">
            <h1>GAME OVER</h1>
            <p id="finalScore" style="font-size: 1.5rem;"></p>
            <button onclick="startGame()">Retry</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreBoard = document.getElementById('scoreBoard');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScore = document.getElementById('finalScore');

        let width, height, gameRunning = false, score = 0, highScore = localStorage.getItem('nr-high') || 0, speed = 5;
        let player = { y: 0, dy: 0, jump: -12, gravity: 0.6, grounded: false };
        let obstacles = [], coins = [], particles = [];

        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; player.y = height - 100; }
        window.addEventListener('resize', resize);
        resize();

        function startGame() {
            score = 0; speed = 5; obstacles = []; coins = []; particles = [];
            gameRunning = true;
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            requestAnimationFrame(loop);
        }

        function spawn() {
            if (Math.random() < 0.02) obstacles.push({ x: width, w: 40, h: 40 + Math.random() * 60 });
            if (Math.random() < 0.01) coins.push({ x: width, y: height - 150 - Math.random() * 100, r: 10 });
        }

        function loop() {
            if (!gameRunning) return;
            ctx.fillStyle = 'rgba(5, 5, 15, 0.3)';
            ctx.fillRect(0, 0, width, height);

            // Player
            player.dy += player.gravity;
            player.y += player.dy;
            if (player.y > height - 100) { player.y = height - 100; player.dy = 0; player.grounded = true; }
            ctx.fillStyle = '#8b5cf6';
            ctx.shadowBlur = 15; ctx.shadowColor = '#8b5cf6';
            ctx.fillRect(50, player.y - 40, 40, 40);
            ctx.shadowBlur = 0;

            // Obstacles
            obstacles.forEach(o => {
                o.x -= speed;
                ctx.fillStyle = '#db2777';
                ctx.fillRect(o.x, height - o.h, o.w, o.h);
                if (50 < o.x + o.w && 50 + 40 > o.x && player.y - 40 < height && player.y > height - o.h) gameOver();
            });
            obstacles = obstacles.filter(o => o.x > -o.w);

            // Coins
            coins.forEach(c => {
                c.x -= speed;
                ctx.fillStyle = '#f59e0b';
                ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2); ctx.fill();
                if (50 < c.x + c.r && 50 + 40 > c.x - c.r && player.y - 40 < c.y + c.r && player.y > c.y - c.r) {
                    score += 100; coins = coins.filter(coin => coin !== c);
                }
            });

            score++; speed += 0.001;
            scoreBoard.innerText = `Score: ${Math.floor(score/10)} | High: ${highScore}`;
            spawn();
            requestAnimationFrame(loop);
        }

        function gameOver() {
            gameRunning = false;
            if (score > highScore) { highScore = Math.floor(score/10); localStorage.setItem('nr-high', highScore); }
            finalScore.innerText = `Final Score: ${Math.floor(score/10)}`;
            gameOverScreen.classList.remove('hidden');
        }

        window.addEventListener('keydown', e => { if (e.code === 'Space' && player.grounded) { player.dy = player.jump; player.grounded = false; } });
        canvas.addEventListener('touchstart', () => { if (player.grounded) { player.dy = player.jump; player.grounded = false; } });

    </script>
</body>
</html>
